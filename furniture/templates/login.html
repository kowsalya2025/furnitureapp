{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
/* OVERLAY BACKGROUND */
.overlay {
    margin: 50px 0;
    width: 100%;
    min-height: calc(100vh - 80px); /* adjusted for responsiveness */
    background: url("{% static 'images/login.png' %}");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px; /* added padding for smaller screens */
    box-sizing: border-box;
}

/* MODAL BOX */
.modal {
    position: relative; 
    width: 100%;
    max-width: 450px; /* modified for responsiveness */
    padding: 35px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.8);
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    box-sizing: border-box;
}

/* TITLE */
.modal h2 {
    font-size: 32px;
    margin-bottom: 20px;
}

/* INPUT */
.modal .input-group {
    position: relative;
    width: 100%;
}
.modal input {
    width: 100%;
    padding: 14px;
    padding-right: 40px; /* space for eye icon */
    margin: 12px 0;
    border-radius: 30px;
    border: 2px solid orange;
    outline: none;
    font-size: 15px;
    background: transparent;
    box-sizing: border-box;
}

.password-toggle {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #444;
}

/* LOGIN ROW */
.login-row {
    display: flex;
    flex-direction: column; /* Center alignment */
    align-items: center;
    gap: 15px;
    margin-top: 10px;
}

/* LOGIN BUTTON */
.login-btn {
    background: linear-gradient(to right, #ffd54f, #ff7a00);
    border: none;
    padding: 12px 40px;
    border-radius: 30px;
    color: white;
    font-size: 18px;
    cursor: pointer;
    width: 100%;
    max-width: 200px;
}

/* FORGOT TEXT */
.forgot {
    font-size: 14px;
    color: #444;
    text-decoration: none;
}

/* DIVIDER */
.divider {
    margin: 20px 0;
    display: flex;
    align-items: center;
    gap: 10px;
}

.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #aaa;
}

/* SOCIAL BOX */
.social-box {
    border: 2px solid orange;
    border-radius: 20px;
    padding: 12px;
    display: flex;
    justify-content: space-around;
}

.social-box img {
    width: 30px;
    cursor: pointer;
}

/* BOTTOM TEXT */
.bottom-text {
    margin-top: 15px;
    font-size: 14px;
}

.bottom-text a {
    color: orange;
    text-decoration: none;
    font-weight: bold;
}
</style>

<div class="overlay" id="popup">
  <div class="modal">
    <h2>Login !</h2>

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.GET.next }}">
      <div class="input-group">
        <input type="text" name="username" placeholder="Username" required>
      </div>
      <div class="input-group">
        <input type="password" name="password" id="loginPassword" placeholder="Password" required>
        <span class="password-toggle" onclick="togglePassword('loginPassword', this)">👁️</span>
      </div>

      <div class="login-row">
        <button type="submit" class="login-btn">Login</button>
        <a href="{% url 'password_reset' %}" class="forgot">Forget your password?</a>
      </div>

      {% if messages %}
        <br>
        {% for message in messages %}
          <div style="color: {% if message.tags == 'success' %}green{% else %}red{% endif %}; font-size: 14px; margin-bottom: 10px;">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <div class="divider">
        <span>Sign Up Using</span>
      </div>

      <div class="social-box">
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="Google"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="Twitter"></a>
      </div>

      <p class="bottom-text">
        Don’t have an account ? 
        <a href="{% url 'register' %}">Create New Account</a>
      </p>

    </form>
  </div>
</div>

<script>
function togglePassword(inputId, icon) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        icon.innerText = "🕵️";
    } else {
        input.type = "password";
        icon.innerText = "👁️";
    }
}

// Ensure messages disappear after 5 seconds
setTimeout(() => {
    const msgs = document.querySelectorAll('.messages div');
    msgs.forEach(msg => msg.style.display = 'none');
}, 5000);
</script>
{% endblock %}
