{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
.overlay { margin: 50px 0; width: 100%; min-height: calc(100vh - 80px); background: url("{% static 'images/login.png' %}"); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
.modal { position: relative; width: 100%; max-width: 450px; padding: 35px; border-radius: 20px; backdrop-filter: blur(15px); background: rgba(255,255,255,0.8); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); box-sizing: border-box; }
.modal h2 { font-size: 28px; margin-bottom: 20px; }
.modal p { font-size: 15px; margin-bottom: 20px; color: #333; }
.login-btn { background: linear-gradient(to right, #ffd54f, #ff7a00); border: none; padding: 12px 40px; border-radius: 30px; color: white; font-size: 18px; cursor: pointer; width: 100%; max-width: 200px; text-decoration: none; display: inline-block; }
</style>

<div class="overlay">
  <div class="modal">
    <h2>Password Reset Complete</h2>
    <p>Your password has been set. You may go ahead and log in now.</p>
    <a href="{% url 'login' %}" class="login-btn">Log in</a>
  </div>
</div>
{% endblock %}
