{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
.overlay { margin: 50px 0; width: 100%; min-height: calc(100vh - 80px); background: url("{% static 'images/login.png' %}"); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
.modal { position: relative; width: 100%; max-width: 450px; padding: 35px; border-radius: 20px; backdrop-filter: blur(15px); background: rgba(255,255,255,0.8); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); box-sizing: border-box; }
.modal h2 { font-size: 28px; margin-bottom: 20px; }
.modal p { font-size: 14px; margin-bottom: 20px; color: #333; }
.modal input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 30px; border: 2px solid orange; outline: none; font-size: 15px; background: transparent; box-sizing: border-box; }
.login-btn { background: linear-gradient(to right, #ffd54f, #ff7a00); border: none; padding: 12px 40px; border-radius: 30px; color: white; font-size: 18px; cursor: pointer; width: 100%; max-width: 250px; margin-top: 15px; }
</style>

<div class="overlay">
  <div class="modal">
    {% if validlink %}
      <h2>Set a New Password</h2>
      <form method="post">
        {% csrf_token %}
        <input type="password" name="new_password1" placeholder="New Password" required>
        <input type="password" name="new_password2" placeholder="Confirm New Password" required>
        <button type="submit" class="login-btn">Change Password</button>
      </form>
    {% else %}
      <h2>Reset link invalid</h2>
      <p>The password reset link was invalid, possibly because it has already been used. Please request a new password reset.</p>
    {% endif %}
  </div>
</div>
{% endblock %}
