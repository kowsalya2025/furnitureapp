{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
/* OVERLAY BACKGROUND */
.overlay {
    margin: 50px 0;
    width: 100%;
    min-height: calc(100vh - 80px); /* adjusted for responsiveness */
    background: url("{% static 'images/login.png' %}");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px; /* added padding for smaller screens */
    box-sizing: border-box;
}

/* MODAL BOX */
.modal {
    position: relative; 
    width: 100%;
    max-width: 450px; /* modified for responsiveness */
    padding: 35px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.8);
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    box-sizing: border-box;
}

/* TITLE */
.modal h2 {
    font-size: 32px;
    margin-bottom: 20px;
}

/* INPUT */
.modal .input-group {
    position: relative;
    width: 100%;
}
.modal input {
    width: 100%;
    padding: 14px;
    padding-right: 40px; /* space for eye icon */
    margin: 12px 0;
    border-radius: 30px;
    border: 2px solid orange;
    outline: none;
    font-size: 15px;
    background: transparent;
    box-sizing: border-box;
}

.password-toggle {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #444;
}

/* LOGIN ROW */
.login-row {
    display: flex;
    flex-direction: column; /* Center alignment */
    align-items: center;
    gap: 15px;
    margin-top: 10px;
}

/* LOGIN BUTTON */
.login-btn {
    background: linear-gradient(to right, #ffd54f, #ff7a00);
    border: none;
    padding: 12px 40px;
    border-radius: 30px;
    color: white;
    font-size: 18px;
    cursor: pointer;
    width: 100%;
    max-width: 200px;
}

/* BOTTOM TEXT */
.bottom-text {
    margin-top: 15px;
    font-size: 14px;
}

.bottom-text a {
    color: orange;
    text-decoration: none;
    font-weight: bold;
}
</style>


<!-- ================= SIGNUP POPUP ================= -->
<div class="overlay" id="signupPopup">
  <div class="modal">

    <h2>Sign Up</h2>

    <form method="POST" action="{% url 'signup' %}">
      {% csrf_token %}

      <div class="input-group">
        <input type="text" name="username" placeholder="Username" required>
      </div>
      <div class="input-group">
        <input type="email" name="email" placeholder="Email" required>
      </div>
      <div class="input-group">
        <input type="password" name="password" id="regPassword" placeholder="Password" required>
        <span class="password-toggle" onclick="togglePassword('regPassword', this)">👁️</span>
      </div>
      <div class="input-group">
        <input type="password" name="confirm_password" id="regConfirmPassword" placeholder="Confirm Password" required>
        <span class="password-toggle" onclick="togglePassword('regConfirmPassword', this)">👁️</span>
      </div>

      {% if messages %}
        <br>
        {% for message in messages %}
          <div style="color: {% if message.tags == 'success' %}green{% else %}red{% endif %}; font-size: 14px; margin-bottom: 10px;">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <div class="login-row">
        <button class="login-btn">Sign Up</button>
      </div>

      <p class="bottom-text">
          Already have an account ? 
          <a href="{% url 'login' %}">Log in</a>
      </p>
    </form>

  </div>
</div>

<script>
function togglePassword(inputId, icon) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        icon.innerText = "🕵️";
    } else {
        input.type = "password";
        icon.innerText = "👁️";
    }
}

setTimeout(() => {
    const msgs = document.querySelectorAll('.messages div');
    msgs.forEach(msg => msg.style.display = 'none');
}, 5000);
</script>
{% endblock %}
