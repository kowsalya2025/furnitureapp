{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
    /* OVERLAY BACKGROUND */
.overlay {
    position: fixed;
  top: 80px; 
    left: 0;
    width: 100%;
    height: 100vh;

    z-index: 9999;   /* 🔥 important */

    background: 
        url("{% static 'images/login.png' %}");

    background-size: cover;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* MODAL BOX */

.modal {
      position: relative; 
    width: 450px;
    padding: 35px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.6);
    text-align: center;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* TITLE */
.modal h2 {
    font-size: 32px;
    margin-bottom: 20px;
}
/* CLOSE BUTTON */ 
.modal .close {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 22px;
    cursor: pointer;
}

/* INPUT */
.modal input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 30px;
    border: 2px solid orange;
    outline: none;
    font-size: 15px;
    background: transparent;
}

/* LOGIN ROW */
.login-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* LOGIN BUTTON */
.login-btn {
    background: linear-gradient(to right, #ffd54f, #ff7a00);
    border: none;
    padding: 12px 40px;
    border-radius: 30px;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* FORGOT TEXT */
.forgot {
    font-size: 14px;
    color: #444;
    text-decoration: none;
}

/* DIVIDER */
.divider {
    margin: 20px 0;
    display: flex;
    align-items: center;
    gap: 10px;
}

.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #aaa;
}

/* SOCIAL BOX */
.social-box {
    border: 2px solid orange;
    border-radius: 20px;
    padding: 12px;
    display: flex;
    justify-content: space-around;
}

.social-box img {
    width: 30px;
    cursor: pointer;
}

/* BOTTOM TEXT */
.bottom-text {
    margin-top: 15px;
    font-size: 14px;
}

.bottom-text a {
    color: orange;
    text-decoration: none;
    font-weight: bold;
}
</style>


<!-- ================= LOGIN POPUP ================= -->
<div class="overlay" id="popup">
  <div class="modal">
<span class="close" onclick="closePopup()">×</span>

    <h2>Register Free !</h2>

    <form>
      <input type="email" placeholder="Enter your e-mail" required>
      <input type="password" placeholder="Password" required>

      <div class="login-row">
        <button type="submit" class="login-btn">Login</button>
        <a href="#" class="forgot">Forget your password?</a>
      </div>

      <div class="divider">
        <span>Sign Up Using</span>
      </div>

      <div class="social-box">
        <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png">
      </div>

      <p class="bottom-text">
        Don’t have an account ? 
        <a href="#" onclick="openSignup(); return false;">Create New Account</a>
      </p>

    </form>
  </div>
</div>


<!-- ================= SIGNUP POPUP ================= -->
<div class="overlay" id="signupPopup" style="display:none;">
  <div class="modal">
    <span class="close" onclick="closeSignupPopup()">×</span>

    <h2>Sign Up</h2>

   <form method="POST" action="{% url 'signup' %}">
    {% csrf_token %}

   <input type="text" name="username" placeholder="Username" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <input type="password" name="confirm_password" placeholder="Confirm Password" required>

    <button class="login-btn">Sign Up</button>

    <p class="bottom-text">
        Already have an account ? 
        <a href="#" onclick="openLogin(); return false;">Log in</a>
    </p>
</form>

  </div>
</div>


<!-- OPEN BUTTON -->
<button onclick="openPopup()">Open Login</button>

<script>
function openPopup() {
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function openSignup() {
    document.getElementById("popup").style.display = "none";
    document.getElementById("signupPopup").style.display = "flex";
}

function closeSignup() {
    document.getElementById("signupPopup").style.display = "none";
}

function openLogin() {
    document.getElementById("signupPopup").style.display = "none";
    document.getElementById("popup").style.display = "flex";
}
</script>
{% endblock %}
