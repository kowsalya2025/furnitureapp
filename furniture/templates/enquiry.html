{% extends 'base.html' %}
{% load static %}

{% block title %}Contact Enquiry - Nagercoil Furniture World{% endblock %}

{% block content %}
<style>
/* Reset and alignment */
.enquiry-page {
    background-color: #f8f6f2; /* Light off-white */
    padding: 60px 40px;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Two-column layout container */
.enquiry-container {
    display: flex;
    max-width: 1100px;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

/* LEFT HALF: YELLOW FORM */
.enquiry-form-wrapper {
    flex: 1;
    background-color: #ffd347; /* Bright yellow matching screenshot */
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
}

.enquiry-form-wrapper form {
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.form-row {
    display: flex;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
    flex: 1;
}

.form-group label {
    font-size: 18px;
    font-weight: 500;
    color: #111;
    margin-bottom: 12px;
}

.form-control {
    background: #fff;
    border: none;
    padding: 16px 20px;
    border-radius: 25px;
    font-size: 16px;
    color: #333;
    outline: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.form-control::placeholder {
    color: #888;
}

textarea.form-control {
    border-radius: 20px;
    resize: vertical;
    min-height: 140px;
}

.btn-submit-enquiry {
    background: #ff8c00;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    padding: 18px 40px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: 0.3s;
    align-self: flex-start;
    margin-top: 10px;
}

.btn-submit-enquiry:hover {
    background: #e67d00;
    transform: translateY(-2px);
}

/* RIGHT HALF: IMAGE */
.enquiry-image-wrapper {
    flex: 1;
    background-color: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.enquiry-image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Responsive */
@media (max-width: 900px) {
    .enquiry-container {
        flex-direction: column;
    }
    .enquiry-image-wrapper {
        min-height: 300px;
    }
}
</style>

<section class="enquiry-page">
    <div class="enquiry-container">
        
        <!-- Left Side: Form -->
        <div class="enquiry-form-wrapper">
            
            {% if messages %}
                <div style="margin-bottom: 20px;">
                    {% for message in messages %}
                        <div style="background: rgba(255,255,255,0.9); color: #ff8c00; padding: 15px; border-radius: 12px; font-weight: 600; text-align: center;">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form action="{% url 'enquiry' %}" method="POST">
                {% csrf_token %}
                
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name*</label>
                        <input type="text" name="first_name" class="form-control" placeholder="Amjath" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name*</label>
                        <input type="text" name="last_name" class="form-control" placeholder="Althaf" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>E-mail*</label>
                        <input type="email" name="email" class="form-control" placeholder="Example@gmail.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone*</label>
                        <input type="text" name="phone" class="form-control" placeholder="7867980688" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Subject*</label>
                    <input type="text" name="subject" class="form-control" placeholder="Product Status" required>
                </div>

                <div class="form-group">
                    <label>Your Message*</label>
                    <textarea name="message" class="form-control" placeholder="hi team status of my product pls check" required></textarea>
                </div>

                <button type="submit" class="btn-submit-enquiry">Submit Feedback</button>
            </form>
        </div>

        <!-- Right Side: Contact Center Image -->
        <div class="enquiry-image-wrapper">
            <!-- Using a solid placeholder matching the support persona, or default to standard -->
            <img src="{% static 'images/contact_support.jpg' %}" onerror="this.src='https://images.unsplash.com/photo-1549923746-c502d488b3ea?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1000&q=80'" alt="Customer Support">
        </div>

    </div>
</section>

{% endblock content %}
